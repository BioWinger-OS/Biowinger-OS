        /* 
            BIOWINGER OS v4.0 - MASTER STYLE SHEET 
        */
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --primary-light: #d1f2eb;
            --white: #ffffff;
            --snow: #f8fafc;
            --slate-50: #f1f5f9;
            --slate-100: #e2e8f0;
            --slate-500: #64748b;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --danger: #ff4757;

            --radius-md: 16px;

            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--snow); color: var(--slate-800); line-height: 1.6; }

        /* NAVEGAÇÃO */
        .main-nav { height: var(--nav-height); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--slate-100); position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; align-items: center; }
        .nav-container { width: 100%; max-width: 1300px; margin: 0 auto; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; }
        .brand-text .title { font-weight: 800; font-size: 1.1rem; color: var(--slate-900); }
        .version-badge { font-size: 0.65rem; background: var(--primary-light); color: var(--primary-dark); padding: 2px 8px; border-radius: 6px; margin-left: 5px; }

        /* ESTILO DO QUESTIONÁRIO (CENTRALIZADO) */
        .quiz-section { padding: 140px 0 80px; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 25px; }
        .glass { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--slate-100); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); padding: 40px; transition: var(--transition); }
        
        .progress-wrapper { margin-bottom: 40px; }
        .progress-bar { height: 8px; background: var(--slate-100); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; }

        .question-card { display: none; }
        .question-card.active { display: block; animation: slideUp 0.5s ease; }
        .opt-btn { width: 100%; padding: 20px; margin-bottom: 12px; border: 2px solid var(--slate-50); background: var(--snow); border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: 600; text-align: left; transition: var(--transition); }
        .opt-btn:hover { border-color: var(--primary); background: var(--primary-light); transform: translateX(5px); }

        /* ESTILO DA ANÁLISE (EDGE-TO-EDGE) */
        #results { display: none; width: 100%; background: var(--white); padding-top: 80px; }
        .edge-container { width: 100%; }

        .analysis-header { 
            width: 100%; 
            padding: 100px 10%; 
            background: linear-gradient(180deg, var(--primary-light) 0%, var(--white) 100%); 
            text-align: center;
            border-bottom: 1px solid var(--slate-100);
        }

        .score-display { font-size: 6rem; font-weight: 800; color: var(--slate-900); line-height: 1; margin-bottom: 10px; }
        .score-label { font-weight: 800; color: var(--primary-dark); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }

        .analysis-grid { width: 100%; display: flex; flex-direction: column; }
        .feedback-row { 
            width: 100%; 
            padding: 40px 10%; 
            border-bottom: 1px solid var(--slate-50); 
            display: grid; 
            grid-template-columns: 200px 1fr; 
            gap: 40px; 
            align-items: center; 
        }
        .feedback-row:nth-child(even) { background: var(--snow); }
        .feedback-row.critical { border-left: 10px solid var(--danger); background: #fffafa; }
        .cat-tag { font-weight: 800; font-size: 0.75rem; color: var(--slate-500); text-transform: uppercase; letter-spacing: 1px; }
        .feedback-text { color: var(--slate-800); font-size: 1rem; line-height: 1.6; }

        /* SUMÁRIO ESTRATÉGICO FULL-WIDTH */
        #overall-summary { 
            width: 100%; 
            padding: 120px 10%; 
            background: var(--slate-900); 
            color: var(--white); 
        }
        .summary-wrapper { max-width: 1400px; margin: 0 auto; }
        .summary-wrapper h2 { color: var(--primary); font-size: 1.5rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 2px; }
        .summary-wrapper p { font-size: 1.15rem; line-height: 2.2; color: var(--slate-100); text-align: justify; }
        .summary-wrapper strong { color: var(--primary); font-weight: 800; border-bottom: 1px solid var(--primary); }

        .results-footer { width: 100%; padding: 60px 10%; background: var(--slate-900); text-align: center; }
        .restart-btn { padding: 25px 60px; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; transition: var(--transition); letter-spacing: 1px; }
        .restart-btn:hover { background: var(--primary-dark); transform: scale(1.05); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

let current = 0;
let answers = [];

function initQuiz() {
    const container = document.getElementById('questions-container');
    quizData.forEach((data, index) => {
        const div = document.createElement('div');
        div.className = `question-card ${index === 0 ? 'active' : ''}`;
        div.innerHTML = `
            <h2 style="font-size:1.8rem; margin-bottom:30px;">${data.q}</h2>
            ${data.opt.map((o, i) => `
                <button class="opt-btn" onclick="handleStep(${index}, ${i})">${o.t}</button>
            `).join('')}
        `;
        container.appendChild(div);
    });
}

function handleStep(qIdx, oIdx) {
    answers.push({ q: qIdx, o: oIdx });
    const cards = document.querySelectorAll('.question-card');
    cards[current].classList.remove('active');
    current++;

    if(current < quizData.length) {
        cards[current].classList.add('active');
        const pct = (current / quizData.length) * 100;
        document.getElementById('fill').style.width = pct + '%';
        document.getElementById('step-count').innerText = `${current + 1}/15`;
        document.getElementById('category-name').innerText = `CATEGORIA: ${quizData[current].cat}`;
    } else {
        renderResults();
    }
}

function renderResults() {
    document.getElementById('quiz-section').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    let total = 0, max = 0, criticals = 0;
    const catScores = {};
    const feedbackList = document.getElementById('detailed-feedback');

    answers.forEach(ans => {
        const q = quizData[ans.q];
        const opt = q.opt[ans.o];
        total += opt.p * q.w;
        max += 5 * q.w;
        catScores[q.cat] = (catScores[q.cat] || 0) + opt.p;
        if(ans.o === 3) criticals++;

        const row = document.createElement('div');
        row.className = `feedback-row ${ans.o === 3 ? 'critical' : ''}`;
        row.innerHTML = `
            <div class="cat-tag">${q.cat}</div>
            <div class="feedback-text">
                <strong style="display:block; margin-bottom:5px;">${ans.o === 3 ? '🚨 ALERTA DE PERFORMANCE' : '✅ DIAGNÓSTICO'}</strong>
                ${opt.f}
            </div>
        `;
        feedbackList.appendChild(row);
    });

    const pct = Math.round((total / max) * 100);
    document.getElementById('final-pct').innerText = pct + '%';
    document.getElementById('status-label').innerText = pct > 80 ? "PROSPECTO DE ELITE" : pct > 50 ? "POTENCIAL EM DESENVOLVIMENTO" : "REESTRUTURAÇÃO OBRIGATÓRIA";
